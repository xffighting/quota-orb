<svg width="640" height="280" viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="640" height="280" rx="18" fill="#FAFAF7"/>
  <text x="40" y="58" font-size="30" font-weight="700" fill="#1A1A18">Quota Orb</text>
  <text x="40" y="88" font-size="15" fill="#5F5E5A">一眼看清 AI 订阅额度，别让它白白过期</text>
  <text x="40" y="110" font-size="13" fill="#888780">Glanceable floating orbs for your Claude &amp; ChatGPT quota</text>

  <!-- Claude orb -->
  <g transform="translate(150,200)">
    <circle r="46" fill="#FFFFFF" stroke="#EFEDE6" stroke-width="1"/>
    <circle r="34" fill="none" stroke="#D85A30" stroke-opacity="0.16" stroke-width="6"/>
    <circle r="34" fill="none" stroke="#D85A30" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round" stroke-dasharray="43 171" transform="rotate(-90)"/>
    <circle r="25" fill="none" stroke="#1D9E75" stroke-opacity="0.16" stroke-width="5"/>
    <circle r="25" fill="none" stroke="#1D9E75" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round" stroke-dasharray="63 94" transform="rotate(-90)"/>
    <text y="-13" text-anchor="middle" font-size="11" font-weight="700" fill="#D85A30" fill-opacity="0.8">C</text>
    <text y="5" text-anchor="middle" font-size="15" font-weight="700" fill="#D85A30" font-family="ui-monospace, monospace">1h28</text>
    <text y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#1D9E75" font-family="ui-monospace, monospace">2d</text>
  </g>
  <text x="150" y="266" text-anchor="middle" font-size="12" fill="#5F5E5A">Claude</text>

  <!-- ChatGPT orb -->
  <g transform="translate(300,200)">
    <circle r="46" fill="#FFFFFF" stroke="#EFEDE6" stroke-width="1"/>
    <circle r="34" fill="none" stroke="#10A37F" stroke-opacity="0.16" stroke-width="6"/>
    <circle r="34" fill="none" stroke="#10A37F" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round" stroke-dasharray="28 186" transform="rotate(-90)"/>
    <circle r="25" fill="none" stroke="#9B8AFB" stroke-opacity="0.16" stroke-width="5"/>
    <circle r="25" fill="none" stroke="#9B8AFB" stroke-opacity="0.55" stroke-width="5" stroke-linecap="round" stroke-dasharray="140 17" transform="rotate(-90)"/>
    <text y="-13" text-anchor="middle" font-size="11" font-weight="700" fill="#10A37F" fill-opacity="0.8">G</text>
    <text y="5" text-anchor="middle" font-size="15" font-weight="700" fill="#10A37F" font-family="ui-monospace, monospace">3h28</text>
    <text y="22" text-anchor="middle" font-size="11" font-weight="600" fill="#9B8AFB" font-family="ui-monospace, monospace">5d</text>
  </g>
  <text x="300" y="266" text-anchor="middle" font-size="12" fill="#5F5E5A">ChatGPT</text>

  <!-- legend -->
  <g transform="translate(410,150)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#D85A30" fill-opacity="0.55"/>
    <text x="22" y="12" font-size="13" fill="#444441">外环 · 5 小时窗口倒计时</text>
    <rect x="0" y="26" width="14" height="14" rx="3" fill="#1D9E75" fill-opacity="0.55"/>
    <text x="22" y="38" font-size="13" fill="#444441">内环 · 周窗口倒计时</text>
    <rect x="0" y="52" width="14" height="14" rx="3" fill="#E24B4A" fill-opacity="0.6"/>
    <text x="22" y="64" font-size="13" fill="#444441">呼吸红 · 额度快清零，快用</text>
    <rect x="0" y="78" width="14" height="14" rx="3" fill="#EF9F27" fill-opacity="0.6"/>
    <text x="22" y="90" font-size="13" fill="#444441">琥珀 · 用得偏慢，别浪费</text>
  </g>
</svg>
